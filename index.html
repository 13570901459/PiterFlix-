<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DS Store - Acessórios e Conserto de Celulares</title>
  <style>
    /* ==========================================
       1. VARIÁVEIS E ESTILOS GERAIS (CSS)
       ========================================== */
    :root {
      --bg-dark: #0a0e17;
      --bg-card: #121a29;
      --accent-blue: #0077be;
      --ocean-glow: #00d2ff;
      --text-light: #f0f4f8;
      --text-muted: #8a99ad;
      --border-color: #1e2d42;
      --success: #28a745;
      --danger: #dc3545;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      padding-bottom: 80px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.3s ease;
    }

    /* Container Global */
    .container {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ==========================================
       2. CABEÇALHO E LOGO AJUSTADA
       ========================================== */
    header {
      background-color: rgba(10, 14, 23, 0.95);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
      padding: 15px 0;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    /* Logo Ajustada: Ícone Azul DS + Store */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #fff;
      cursor: grab;
      user-select: none;
      transition: transform 0.2s ease;
    }

    .logo:active {
      cursor: grabbing;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, var(--accent-blue), var(--ocean-glow));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
      animation: floatLogo 3s ease-in-out infinite alternate;
      font-size: 1.2rem;
      font-weight: 900;
      color: #fff;
    }

    @keyframes floatLogo {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-4px) rotate(2deg); }
    }

    .logo-text {
      color: var(--text-light);
    }

    /* Busca de Produtos */
    .search-box {
      flex: 1;
      max-width: 500px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 20px;
      border-radius: 25px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-card);
      color: #fff;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      border-color: var(--ocean-glow);
      outline: none;
      box-shadow: 0 0 12px rgba(0, 210, 255, 0.3);
    }

    /* Menu Nav de Categorias */
    nav {
      background-color: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      overflow-x: auto;
    }

    .nav-categories {
      display: flex;
      white-space: nowrap;
      list-style: none;
      padding: 12px 0;
      gap: 10px;
    }

    .nav-categories li button {
      background: transparent;
      color: var(--text-muted);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-categories li button.active,
    .nav-categories li button:hover {
      color: var(--ocean-glow);
      background-color: rgba(0, 210, 255, 0.1);
      border-color: var(--ocean-glow);
    }

    .nav-categories li button.btn-tech-menu {
      background: rgba(0, 119, 190, 0.2);
      border-color: var(--accent-blue);
      color: #fff;
    }

    .nav-categories li button.btn-tech-menu:hover,
    .nav-categories li button.btn-tech-menu.active {
      background: linear-gradient(135deg, var(--accent-blue), var(--ocean-glow));
      color: #fff;
    }

    /* ==========================================
       3. SEÇÕES DE CONTEÚDO (PRODUTOS / ASSISTÊNCIA)
       ========================================== */
    .page-section {
      display: none;
    }

    .page-section.active {
      display: block;
    }

    .section-title {
      font-size: 1.5rem;
      margin: 25px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: var(--border-color);
    }

    /* Vitrine de Produtos Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 22px;
    }

    .product-card {
      background-color: var(--bg-card);
      border-radius: 14px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.25 ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
      border-color: var(--ocean-glow);
      box-shadow: 0 8px 20px rgba(0, 210, 255, 0.15);
    }

    .product-img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      background-color: #000;
    }

    .product-details {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-category {
      font-size: 0.75rem;
      color: var(--ocean-glow);
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .product-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .product-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      flex: 1;
    }

    .product-obs {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-dark);
      color: #fff;
      font-size: 0.8rem;
      margin-bottom: 12px;
    }

    .product-price {
      font-size: 1.25rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 14px;
    }

    .product-actions {
      display: flex;
      gap: 8px;
    }

    .btn-add-cart {
      flex: 1;
      background-color: transparent;
      border: 1px solid var(--accent-blue);
      color: var(--ocean-glow);
      padding: 9px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .btn-add-cart:hover {
      background-color: var(--accent-blue);
      color: #fff;
    }

    .btn-buy-now {
      flex: 1;
      background: linear-gradient(135deg, var(--accent-blue), var(--ocean-glow));
      color: #fff;
      padding: 9px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .btn-buy-now:hover {
      opacity: 0.9;
    }

    /* Página da Assistência Técnica */
    .maintenance-container {
      max-width: 700px;
      margin: 20px auto;
      background-color: var(--bg-card);
      padding: 30px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .maintenance-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .maintenance-header h2 {
      color: var(--ocean-glow);
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .maintenance-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input, 
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-dark);
      color: #fff;
      font-size: 0.95rem;
    }

    .form-group textarea {
      resize: vertical;
      height: 90px;
    }

    .btn-submit-budget {
      width: 100%;
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: white;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.05rem;
      margin-top: 10px;
    }

    .btn-submit-budget:hover {
      opacity: 0.95;
    }

    /* ==========================================
       4. CARRINHO FLUTUANTE SOFISTICADO
       ========================================== */
    .floating-cart-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), var(--ocean-glow));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.4);
      z-index: 120;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .floating-cart-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 25px rgba(0, 210, 255, 0.6);
    }

    .floating-cart-icon {
      font-size: 1.6rem;
    }

    /* Badge Contador Dinâmico */
    .cart-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background-color: var(--danger);
      color: #fff;
      font-size: 0.8rem;
      font-weight: bold;
      min-width: 24px;
      height: 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      border: 2px solid var(--bg-dark);
      animation: pulseBadge 0.3s ease-out;
    }

    @keyframes pulseBadge {
      0% { transform: scale(0.6); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* Modal do Carrinho Lateral */
    .cart-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: flex-end;
      z-index: 150;
    }

    .cart-modal.open {
      display: flex;
    }

    .cart-content {
      width: 100%;
      max-width: 450px;
      background-color: var(--bg-card);
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px;
      border-left: 1px solid var(--border-color);
      overflow-y: auto;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
      margin-bottom: 15px;
    }

    .close-cart {
      background: transparent;
      color: var(--text-muted);
      font-size: 1.8rem;
    }

    .cart-items {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      padding-right: 5px;
    }

    .cart-item {
      display: flex;
      gap: 12px;
      background-color: var(--bg-dark);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
    }

    .cart-item-img {
      width: 65px;
      height: 65px;
      object-fit: cover;
      border-radius: 8px;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .cart-item-obs {
      font-size: 0.75rem;
      color: var(--ocean-glow);
      margin-top: 3px;
    }

    .cart-item-price {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-qty {
      background-color: var(--border-color);
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      font-weight: bold;
    }

    .btn-remove {
      background: transparent;
      color: var(--danger);
      font-size: 0.85rem;
      margin-left: auto;
    }

    .cart-summary {
      border-top: 1px solid var(--border-color);
      padding-top: 15px;
      margin-top: 15px;
    }

    .coupon-box {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    .coupon-box input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-dark);
      color: #fff;
    }

    .coupon-box button {
      background-color: var(--accent-blue);
      color: #fff;
      padding: 0 15px;
      border-radius: 6px;
      font-weight: 600;
    }

    .checkout-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 15px;
    }

    .checkout-form input {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-dark);
      color: #fff;
      font-size: 0.85rem;
    }

    .checkout-row {
      display: flex;
      gap: 8px;
    }

    .cart-total-details {
      margin-bottom: 15px;
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-bottom: 5px;
      color: var(--text-muted);
    }

    .cart-total-row.final {
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      border-top: 1px dashed var(--border-color);
      padding-top: 8px;
    }

    .cart-actions-footer {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-finish {
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
    }

    .btn-clear {
      background-color: transparent;
      color: var(--danger);
      padding: 6px;
      font-size: 0.85rem;
    }

    /* Alerta Toaster Flutuante */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: var(--ocean-glow);
      color: #000;
      text-align: center;
      border-radius: 25px;
      padding: 12px 20px;
      position: fixed;
      z-index: 200;
      bottom: 30px;
      left: 30px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,210,255,0.4);
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
    }

    #toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 40px;
    }

    /* Dispositivos Móveis */
    @media (max-width: 600px) {
      .header-content {
        flex-direction: column;
        align-items: stretch;
      }
      .logo {
        justify-content: center;
      }
      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }
      .product-img {
        height: 140px;
      }
      .floating-cart-btn {
        bottom: 20px;
        right: 20px;
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
<body>

  <!-- ==========================================
       CABEÇALHO DA LOJA
       ========================================== -->
  <header>
    <div class="container header-content">
      <!-- Logo Ajustada: Somente DS no ícone azul + Store -->
      <div class="logo" id="draggableLogo" title="Clique e arraste a logo!">
        <div class="logo-icon">DS</div>
        <div class="logo-text">Store</div>
      </div>

      <!-- Buscar Produtos -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar produtos por nome ou categoria..." onkeyup="filterProducts()" />
      </div>
    </div>
  </header>

  <!-- ==========================================
       MENU DE CATEGORIAS E ASSISTÊNCIA TÉCNICA
       ========================================== -->
  <nav>
    <div class="container">
      <ul class="nav-categories" id="categoriesMenu">
        <!-- Renderizado via JS -->
      </ul>
    </div>
  </nav>

  <main class="container">
    <!-- ==========================================
         PÁGINA 1: CATÁLOGO DE PRODUTOS
         ========================================== -->
    <section id="productsSection" class="page-section active">
      <h2 class="section-title" id="currentCategoryTitle">Todos os Produtos</h2>
      <div class="products-grid" id="productsGrid">
        <!-- Produtos injetados via JS -->
      </div>
    </section>

    <!-- ==========================================
         PÁGINA 2: FORMULÁRIO DE ASSISTÊNCIA TÉCNICA
         ========================================== -->
    <section id="maintenanceSection" class="page-section">
      <div class="maintenance-container">
        <div class="maintenance-header">
          <h2>🛠️ Orçamento de Manutenção</h2>
          <p>Preencha os dados do seu aparelho para receber a cotação diretamente no nosso WhatsApp!</p>
        </div>
        <form onsubmit="sendBudgetWhatsApp(event)">
          <div class="form-group">
            <label>Nome do Cliente</label>
            <input type="text" id="budgetName" placeholder="Ex: Leandro Silva" required />
          </div>
          <div class="form-group">
            <label>Modelo do Celular</label>
            <input type="text" id="budgetModel" placeholder="Ex: iPhone 11, Galaxy A54" required />
          </div>
          <div class="form-group">
            <label>Defeito Apresentado</label>
            <textarea id="budgetDefect" placeholder="Ex: Tela trincada, não carrega, conector solto..." required></textarea>
          </div>
          <div class="form-group">
            <label>Telefone para Contato</label>
            <input type="tel" id="budgetPhone" placeholder="(81) 99999-9999" required />
          </div>
          <div class="form-group">
            <label>Endereço Completo</label>
            <input type="text" id="budgetAddress" placeholder="Rua, Número, Bairro e Cidade" required />
          </div>
          <button type="submit" class="btn-submit-budget">Enviar Orçamento para o WhatsApp</button>
        </form>
      </div>
    </section>
  </main>

  <!-- ==========================================
       CARRINHO FLUTUANTE SOFISTICADO
       ========================================== -->
  <div class="floating-cart-btn" onclick="toggleCart()">
    <span class="floating-cart-icon">🛒</span>
    <span class="cart-badge" id="cartCount">0</span>
  </div>

  <!-- Modal do Carrinho Lateral -->
  <div class="cart-modal" id="cartModal">
    <div class="cart-content">
      <div class="cart-header">
        <h3>Seu Carrinho</h3>
        <button class="close-cart" onclick="toggleCart()">&times;</button>
      </div>

      <div class="cart-items" id="cartItemsContainer">
        <!-- Itens injetados via JS -->
      </div>

      <div class="cart-summary">
        <!-- Cupom -->
        <div class="coupon-box">
          <input type="text" id="couponInput" placeholder="Cupom de desconto (Ex: DS10)" />
          <button onclick="applyCoupon()">Aplicar</button>
        </div>

        <!-- Dados de Entrega -->
        <div class="checkout-form">
          <input type="text" id="custName" placeholder="Seu Nome Completo" />
          <input type="text" id="custAddress" placeholder="Endereço / Rua" />
          <div class="checkout-row">
            <input type="text" id="custNumber" placeholder="Nº" style="width: 80px;" />
            <input type="text" id="custNeighborhood" placeholder="Bairro" style="flex:1;" />
          </div>
          <input type="text" id="custCity" placeholder="Cidade" />
        </div>

        <!-- Totais -->
        <div class="cart-total-details">
          <div class="cart-total-row">
            <span>Subtotal:</span>
            <span id="subtotalValue">R$ 0,00</span>
          </div>
          <div class="cart-total-row" id="discountRow" style="display:none; color: var(--ocean-glow);">
            <span>Desconto:</span>
            <span id="discountValue">- R$ 0,00</span>
          </div>
          <div class="cart-total-row final">
            <span>Total:</span>
            <span id="totalValue">R$ 0,00</span>
          </div>
        </div>

        <!-- Botões -->
        <div class="cart-actions-footer">
          <button class="btn-finish" onclick="finishCheckoutWhatsApp()">Finalizar Compra via WhatsApp</button>
          <button class="btn-clear" onclick="clearCart()">Limpar Carrinho</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Alerta Toast -->
  <div id="toast">Produto adicionado ao carrinho!</div>

  <!-- ==========================================
       LÓGICA JAVASCRIPT
       ========================================== -->
  <script>
    /* 1. DADOS DOS PRODUTOS (JSON) */
    const initialProductsJSON = [
      {
        "id": 1,
        "name": "Fone Bluetooth TWS Bass Pro",
        "category": "fone de ouvido",
        "price": 129.90,
        "description": "Som estéreo de alta definição e bateria de longa duração.",
        "image": "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?auto=format&fit=crop&w=400&q=80"
      },
      {
        "id": 2,
        "name": "Carregador Rápido Type-C 20W",
        "category": "carregador",
        "price": 59.90,
        "description": "Carregamento turbo seguro para Android e iPhone.",
        "image": "https://images.unsplash.com/photo-1583863788434-e58a36330cf0?auto=format&fit=crop&w=400&q=80"
      },
      {
        "id": 3,
        "name": "Capinha Aveludada Anti-impacto",
        "category": "capinha",
        "price": 35.00,
        "description": "Proteção máxima com toque suave. Diversas cores.",
        "image": "https://images.unsplash.com/photo-1601593378480-e53a5c1b6953?auto=format&fit=crop&w=400&q=80"
      },
      {
        "id": 4,
        "name": "Película de Vidro 3D Blindada",
        "category": "película",
        "price": 25.00,
        "description": "Cobertura total da tela com alta transparência.",
        "image": "https://images.unsplash.com/photo-1601784551446-20c9e07cdbdb?auto=format&fit=crop&w=400&q=80"
      },
      {
        "id": 5,
        "name": "Power Bank 10.000mAh PowerFast",
        "category": "bateria portátil",
        "price": 110.00,
        "description": "Até 3 cargas completas no seu smartphone de onde estiver.",
        "image": "https://images.unsplash.com/photo-1609592424109-dd9892f1b177?auto=format&fit=crop&w=400&q=80"
      },
      {
        "id": 6,
        "name": "Cabo USB para Lightning Reforçado",
        "category": "cabo USB",
        "price": 29.90,
        "description": "Nylon trançado de alta durabilidade e transferência de dados.",
        "image": "https://images.unsplash.com/photo-1541658016709-82535e94bc69?auto=format&fit=crop&w=400&q=80"
      },
      {
        "id": 7,
        "name": "iPhone 11 64GB - Excelente Estado",
        "category": "celular seminovo novo",
        "price": 1850.00,
        "description": "Seminovo revisado, saúde da bateria 88%, garantia de 3 meses.",
        "image": "https://images.unsplash.com/photo-1565849904461-04a58ad377e0?auto=format&fit=crop&w=400&q=80"
      },
      {
        "id": 8,
        "name": "Samsung Galaxy A54 5G 128GB",
        "category": "celular novo",
        "price": 1699.00,
        "description": "Aparelho novo, lacrado na caixa com 1 ano de garantia de fábrica.",
        "image": "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?auto=format&fit=crop&w=400&q=80"
      }
    ];

    const categoriesList = [
      "todas",
      "fone de ouvido",
      "carregador",
      "capinha",
      "película",
      "bateria portátil",
      "cabo USB",
      "celular seminovo novo",
      "celular novo"
    ];

    // Estados da Aplicação
    let products = [];
    let cart = [];
    let currentCategory = "todas";
    let activeDiscount = 0;
    const WHATSAPP_NUMBER = "5581991152441";

    /* 2. INICIALIZAÇÃO */
    document.addEventListener("DOMContentLoaded", () => {
      const savedProducts = localStorage.getItem("dsstore_products");
      if (savedProducts) {
        products = JSON.parse(savedProducts);
      } else {
        products = initialProductsJSON;
        localStorage.setItem("dsstore_products", JSON.stringify(products));
      }

      const savedCart = localStorage.getItem("dsstore_cart");
      if (savedCart) {
        cart = JSON.parse(savedCart);
      }

      renderCategoriesMenu();
      renderProducts();
      updateCartUI();
      makeLogoDraggable();
    });

    function saveCartToStorage() {
      localStorage.setItem("dsstore_cart", JSON.stringify(cart));
    }

    /* 3. MENU DE CATEGORIAS E NAVEGAÇÃO ENTRE PÁGINAS */
    function renderCategoriesMenu() {
      const container = document.getElementById("categoriesMenu");
      
      let html = categoriesList.map(cat => `
        <li>
          <button 
            class="${(currentCategory === cat && isProductsPageActive()) ? 'active' : ''}" 
            onclick="selectCategory('${cat}')">
            ${cat.charAt(0).toUpperCase() + cat.slice(1)}
          </button>
        </li>
      `).join('');

      // Botão especial da Assistência Técnica no Menu
      html += `
        <li>
          <button 
            class="btn-tech-menu ${!isProductsPageActive() ? 'active' : ''}" 
            onclick="showMaintenancePage()">
            🛠️ Assistência Técnica
          </button>
        </li>
      `;

      container.innerHTML = html;
    }

    function isProductsPageActive() {
      return document.getElementById("productsSection").classList.contains("active");
    }

    function selectCategory(category) {
      currentCategory = category;
      showProductsPage();
      document.getElementById("currentCategoryTitle").innerText = 
        category === "todas" ? "Todos os Produtos" : category.charAt(0).toUpperCase() + category.slice(1);
      renderCategoriesMenu();
      renderProducts();
    }

    function showProductsPage() {
      document.getElementById("productsSection").classList.add("active");
      document.getElementById("maintenanceSection").classList.remove("active");
    }

    function showMaintenancePage() {
      document.getElementById("productsSection").classList.remove("active");
      document.getElementById("maintenanceSection").classList.add("active");
      renderCategoriesMenu();
    }

    /* 4. RENDERIZAÇÃO E FILTRO DE PRODUTOS */
    function renderProducts(filteredList = null) {
      const container = document.getElementById("productsGrid");
      const listToRender = filteredList || getProductsByCategory();

      if (listToRender.length === 0) {
        container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0;">Nenhum produto encontrado nesta categoria.</p>`;
        return;
      }

      container.innerHTML = listToRender.map(product => `
        <div class="product-card">
          <img src="${product.image}" alt="${product.name}" class="product-img" />
          <div class="product-details">
            <span class="product-category">${product.category}</span>
            <h3 class="product-title">${product.name}</h3>
            <p class="product-desc">${product.description}</p>
            
            <input 
              type="text" 
              class="product-obs" 
              id="obs-${product.id}" 
              placeholder="Obs: Cor, modelo do celular..." 
            />
            
            <div class="product-price">R$ ${product.price.toFixed(2).replace('.', ',')}</div>
            
            <div class="product-actions">
              <button class="btn-add-cart" onclick="addToCart(${product.id}, false)">+ Carrinho</button>
              <button class="btn-buy-now" onclick="addToCart(${product.id}, true)">Comprar</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function getProductsByCategory() {
      if (currentCategory === "todas") return products;
      return products.filter(p => p.category.toLowerCase() === currentCategory.toLowerCase());
    }

    function filterProducts() {
      showProductsPage(); // Garante que volta para os produtos ao digitar na busca
      const term = document.getElementById("searchInput").value.toLowerCase();
      const filtered = products.filter(p => 
        p.name.toLowerCase().includes(term) || 
        p.description.toLowerCase().includes(term) ||
        p.category.toLowerCase().includes(term)
      );
      renderProducts(filtered);
    }

    /* 5. SISTEMA DO CARRINHO (ACUMULATIVO E FLUTUANTE) */
    function addToCart(productId, directBuy = false) {
      const product = products.find(p => p.id === productId);
      const obsInput = document.getElementById(`obs-${productId}`);
      const obsText = obsInput ? obsInput.value.trim() : "";

      const existingItem = cart.find(item => item.id === productId && item.obs === obsText);

      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          price: product.price,
          image: product.image,
          obs: obsText,
          quantity: 1
        });
      }

      if (obsInput) obsInput.value = "";
      saveCartToStorage();
      updateCartUI();
      showToast();

      if (directBuy) {
        toggleCart(true);
      }
    }

    function updateCartUI() {
      // Soma dinâmica acumulativa de produtos (1, 2, 3...)
      const totalCount = cart.reduce((acc, item) => acc + item.quantity, 0);
      const badge = document.getElementById("cartCount");
      badge.innerText = totalCount;

      // Renderiza os itens no modal
      const container = document.getElementById("cartItemsContainer");
      
      if (cart.length === 0) {
        container.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 30px 0;">Seu carrinho está vazio.</p>`;
      } else {
        container.innerHTML = cart.map((item, index) => `
          <div class="cart-item">
            <img src="${item.image}" class="cart-item-img" alt="${item.name}" />
            <div class="cart-item-info">
              <div class="cart-item-title">${item.name}</div>
              ${item.obs ? `<div class="cart-item-obs">Obs: ${item.obs}</div>` : ''}
              <div class="cart-item-price">R$ ${item.price.toFixed(2).replace('.', ',')}</div>
              
              <div class="cart-item-controls">
                <button class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
                <span>${item.quantity}</span>
                <button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
                <button class="btn-remove" onclick="removeItem(${index})">Remover</button>
              </div>
            </div>
          </div>
        `).join('');
      }

      // Cálculo de Totais
      const subtotal = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
      const discount = subtotal * activeDiscount;
      const total = subtotal - discount;

      document.getElementById("subtotalValue").innerText = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;
      
      if (activeDiscount > 0) {
        document.getElementById("discountRow").style.display = "flex";
        document.getElementById("discountValue").innerText = `- R$ ${discount.toFixed(2).replace('.', ',')}`;
      } else {
        document.getElementById("discountRow").style.display = "none";
      }

      document.getElementById("totalValue").innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    function changeQty(index, delta) {
      cart[index].quantity += delta;
      if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
      }
      saveCartToStorage();
      updateCartUI();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      saveCartToStorage();
      updateCartUI();
    }

    function clearCart() {
      if (confirm("Deseja mesmo esvaziar seu carrinho?")) {
        cart = [];
        activeDiscount = 0;
        saveCartToStorage();
        updateCartUI();
      }
    }

    function toggleCart(forceOpen = false) {
      const modal = document.getElementById("cartModal");
      if (forceOpen) {
        modal.classList.add("open");
      } else {
        modal.classList.toggle("open");
      }
    }

    function applyCoupon() {
      const coupon = document.getElementById("couponInput").value.trim().toUpperCase();
      if (coupon === "DS10") {
        activeDiscount = 0.10;
        alert("Cupom DS10 aplicado (10% de desconto)!");
      } else if (coupon === "DSSTORE") {
        activeDiscount = 0.15;
        alert("Cupom DSSTORE aplicado (15% de desconto)!");
      } else {
        alert("Cupom inválido. Use 'DS10' para testar.");
        activeDiscount = 0;
      }
      updateCartUI();
    }

    function showToast() {
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, 2500);
    }

    /* 6. INTEGRAÇÃO WHATSAPP */
    function finishCheckoutWhatsApp() {
      if (cart.length === 0) {
        alert("Seu carrinho está vazio!");
        return;
      }

      const name = document.getElementById("custName").value.trim();
      const address = document.getElementById("custAddress").value.trim();
      const number = document.getElementById("custNumber").value.trim();
      const neighborhood = document.getElementById("custNeighborhood").value.trim();
      const city = document.getElementById("custCity").value.trim();

      if (!name || !address || !number || !neighborhood || !city) {
        alert("Por favor, preencha todos os campos do endereço para entrega!");
        return;
      }

      let message = `*NOVO PEDIDO - DS STORE*\n`;
      message += `-----------------------------------\n`;
      message += `*Cliente:* ${name}\n`;
      message += `*Endereço:* ${address}, Nº ${number}\n`;
      message += `*Bairro:* ${neighborhood} - ${city}\n`;
      message += `-----------------------------------\n`;
      message += `*ITENS DO PEDIDO:*\n\n`;

      cart.forEach(item => {
        message += `• *${item.quantity}x* ${item.name}\n`;
        if (item.obs) message += `  _Obs: ${item.obs}_\n`;
        message += `  Val. Un: R$ ${item.price.toFixed(2).replace('.', ',')}\n\n`;
      });

      const subtotal = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
      const discount = subtotal * activeDiscount;
      const total = subtotal - discount;

      message += `-----------------------------------\n`;
      if (activeDiscount > 0) {
        message += `*Subtotal:* R$ ${subtotal.toFixed(2).replace('.', ',')}\n`;
        message += `*Desconto:* R$ ${discount.toFixed(2).replace('.', ',')}\n`;
      }
      message += `*TOTAL:* R$ ${total.toFixed(2).replace('.', ',')}\n`;

      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
    }

    function sendBudgetWhatsApp(event) {
      event.preventDefault();

      const name = document.getElementById("budgetName").value.trim();
      const model = document.getElementById("budgetModel").value.trim();
      const defect = document.getElementById("budgetDefect").value.trim();
      const phone = document.getElementById("budgetPhone").value.trim();
      const address = document.getElementById("budgetAddress").value.trim();

      let message = `*SOLICITAÇÃO DE ORÇAMENTO - MANUTENÇÃO*\n`;
      message += `-----------------------------------\n`;
      message += `*Cliente:* ${name}\n`;
      message += `*Telefone:* ${phone}\n`;
      message += `*Modelo:* ${model}\n`;
      message += `*Defeito:* ${defect}\n`;
      message += `*Endereço:* ${address}\n`;
      message += `-----------------------------------\n`;
      message += `Aguardo retorno com a cotação!`;

      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
    }

    /* 7. LOGO MOVÍVEL E ARRASTÁVEL */
    function makeLogoDraggable() {
      const logo = document.getElementById("draggableLogo");
      let isDragging = false;
      let currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

      logo.addEventListener("mousedown", dragStart);
      document.addEventListener("mouseup", dragEnd);
      document.addEventListener("mousemove", drag);

      logo.addEventListener("touchstart", dragStart, {passive: false});
      document.addEventListener("touchend", dragEnd);
      document.addEventListener("touchmove", drag, {passive: false});

      function dragStart(e) {
        if (e.type === "touchstart") {
          initialX = e.touches[0].clientX - xOffset;
          initialY = e.touches[0].clientY - yOffset;
        } else {
          initialX = e.clientX - xOffset;
          initialY = e.clientY - yOffset;
        }
        if (e.target.closest('#draggableLogo')) {
          isDragging = true;
        }
      }

      function dragEnd() {
        initialX = currentX;
        initialY = currentY;
        isDragging = false;
      }

      function drag(e) {
        if (isDragging) {
          e.preventDefault();
          if (e.type === "touchmove") {
            currentX = e.touches[0].clientX - initialX;
            currentY = e.touches[0].clientY - initialY;
          } else {
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
          }
          xOffset = currentX;
          yOffset = currentY;
          logo.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
        }
      }
    }
  </script>
